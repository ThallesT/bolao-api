spring.application.name=bolao-api

server.servlet.context-path=/api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bolao}
spring.datasource.username=${DB_USERNAME:bolao}
spring.datasource.password=${DB_PASSWORD:bolao123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.jackson.default-property-inclusion=non_null

auth.jwt.issuer=bolao-api
auth.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
auth.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

auth.google.client-id=${GOOGLE_CLIENT_ID:}
auth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
auth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}
auth.google.scope=openid email profile
auth.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
auth.google.token-uri=https://oauth2.googleapis.com/token
auth.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo

